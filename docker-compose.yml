services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: contributr
      POSTGRES_PASSWORD: contributr_secret
      POSTGRES_DB: contributr
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contributr"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    restart: on-failure:3
    environment:
      - RUN_MIGRATIONS=true
      - AI_MODEL=${AI_MODEL:-gpt-4o-mini}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_BASE_URL=${AI_BASE_URL:-}
      - AI_TEMPERATURE=${AI_TEMPERATURE:-0.1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - repos_cache:/tmp/contributr_repos

  worker:
    build: ./backend
    env_file: .env
    restart: on-failure:3
    command: celery -A app.workers.celery_app:celery worker --loglevel=info --pool=solo
    depends_on:
      backend:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - repos_cache:/tmp/contributr_repos

  frontend:
    build: ./frontend
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
      - API_URL=http://backend:8000/api

volumes:
  pgdata:
  repos_cache:

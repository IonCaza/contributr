apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "contributr.fullname" . }}-frontend
  labels:
    {{- include "contributr.componentLabels" (dict "root" . "component" "frontend") | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "contributr.selectorLabels" (dict "root" . "component" "frontend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "contributr.componentLabels" (dict "root" . "component" "frontend") | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-backend
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "contributr.fullname" . }}-backend 8000; do
                echo "Waiting for backend..."
                sleep 2
              done
      containers:
        - name: frontend
          image: {{ include "contributr.image" (dict "root" . "repository" .Values.frontend.image.repository "tag" .Values.frontend.image.tag) }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "contributr.fullname" . }}-frontend
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}

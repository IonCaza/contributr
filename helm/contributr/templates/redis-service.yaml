apiVersion: v1
kind: Service
metadata:
  name: {{ include "contributr.fullname" . }}-redis
  labels:
    {{- include "contributr.componentLabels" (dict "root" . "component" "redis") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: tcp-redis
      protocol: TCP
      name: tcp-redis
  selector:
    {{- include "contributr.selectorLabels" (dict "root" . "component" "redis") | nindent 4 }}

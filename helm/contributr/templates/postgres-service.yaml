apiVersion: v1
kind: Service
metadata:
  name: {{ include "contributr.fullname" . }}-postgresql
  labels:
    {{- include "contributr.componentLabels" (dict "root" . "component" "postgresql") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: tcp-pg
      protocol: TCP
      name: tcp-pg
  selector:
    {{- include "contributr.selectorLabels" (dict "root" . "component" "postgresql") | nindent 4 }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ include "contributr.fullname" . }}-postgresql
  labels:
    {{- include "contributr.componentLabels" (dict "root" . "component" "postgresql") | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgresql.auth.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.auth.password | quote }}
  POSTGRES_DB: {{ .Values.postgresql.auth.database | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "contributr.fullname" . }}-backend
  labels:
    {{- include "contributr.componentLabels" (dict "root" . "component" "backend") | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ include "contributr.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
  DATABASE_URL_SYNC: "postgresql+psycopg://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ include "contributr.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
  REDIS_URL: "redis://{{ include "contributr.fullname" . }}-redis:6379/0"
  SECRET_KEY: {{ .Values.backend.secretKey | quote }}
  JWT_SECRET: {{ .Values.backend.jwtSecret | quote }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "contributr.fullname" . }}-backend
  labels:
    {{- include "contributr.componentLabels" (dict "root" . "component" "backend") | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "contributr.selectorLabels" (dict "root" . "component" "backend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "contributr.componentLabels" (dict "root" . "component" "backend") | nindent 8 }}
    spec:
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "contributr.fullname" . }}-postgresql 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "contributr.fullname" . }}-redis 6379; do
                echo "Waiting for Redis..."
                sleep 2
              done
      containers:
        - name: backend
          image: {{ include "contributr.image" (dict "root" . "registry" .Values.backend.image.registry "repository" .Values.backend.image.repository "tag" .Values.backend.image.tag) }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "contributr.fullname" . }}-backend
            - configMapRef:
                name: {{ include "contributr.fullname" . }}-backend
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          volumeMounts:
            - name: repos-cache
              mountPath: /tmp/contributr_repos
      volumes:
        - name: repos-cache
          persistentVolumeClaim:
            claimName: {{ include "contributr.fullname" . }}-repos-cache
